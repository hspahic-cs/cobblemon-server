name: Build modpack
description: |
  Sets up JDK 21 + Go + restored caches, builds every custom mod under
  custom-mods/ (with per-mod source-hash caching — unchanged mods skip
  rebuild), and stages the runtime jars into modpack/mods/. Optionally
  resolves the full server tree via packwiz-installer-bootstrap (used by
  deploy workflows that need to ship resolved third-party jars to the VM).

  ⚠️  ADDING A NEW MOD: extend the per-mod cache list below AND the
  CACHE_HITS env block in the build step. The verification step at the
  end of the build block fails loudly if you forget.

inputs:
  mod-version:
    description: |
      Value passed as -Pmod_version to gradle. Bakes into each jar's
      filename and mods.toml. NOTE: per-mod caching keys off source hash
      only — bumping mod-version for an unchanged mod hits the cache and
      ships the jar with its previous mod_version. That's by design:
      per-mod versions reflect when their source last changed.
    required: false
    default: ''
  resolve-server-tree:
    description: |
      If 'true', also runs packwiz-installer-bootstrap -s server to
      download the resolved third-party server jars into modpack/mods/.
      Deploy workflows need this; pr-validation doesn't.
    required: false
    default: 'false'
  set-pack-version:
    description: |
      If non-empty, sed pack.toml's `version = "..."` to this value before
      packwiz refresh. Used by release/deploy paths so the exported .mrpack
      reports the right version. The modpack-level version always tracks
      the deploy/release tag, even when individual mod jars are cached.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Set up Go (for packwiz)
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Cache Gradle (deps + wrapper)
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        # Excludes gradle.properties (mod_version bumps every release; we
        # pass -Pmod_version anyway). Dependency versions live in *.gradle*.
        key: gradle-${{ runner.os }}-${{ hashFiles('custom-mods/*/build.gradle*', 'custom-mods/*/settings.gradle*') }}
        restore-keys: gradle-${{ runner.os }}-

    - name: Cache packwiz binary
      id: cache-packwiz
      uses: actions/cache@v4
      with:
        path: ~/go/bin/packwiz
        key: packwiz-${{ runner.os }}-dfd8b68a4796c763e25bad50265ea1f1233e24f1

    - name: Install packwiz
      if: steps.cache-packwiz.outputs.cache-hit != 'true'
      shell: bash
      run: go install github.com/packwiz/packwiz@dfd8b68a4796c763e25bad50265ea1f1233e24f1

    - name: Add packwiz to PATH
      shell: bash
      run: echo "$HOME/go/bin" >> "$GITHUB_PATH"

    # ─── Per-mod jar cache ─────────────────────────────────────────────────────
    # Each mod gets its own cache keyed by a hash of its sources + build files.
    # Cache hit  → restore build/libs/, skip gradle build for that mod (~5s).
    # Cache miss → run gradle assemble/build for that mod (~30-60s per mod).
    #
    # Composite actions can't strategy.matrix, so we enumerate mods statically.
    # The verification step in "Build only mods missing from cache" fails the
    # workflow if a custom-mods/<dir> exists without a matching cache stanza.

    - name: Cache cobblemon-bridge build
      id: cache-bridge
      uses: actions/cache@v4
      with:
        path: custom-mods/cobblemon-bridge/build/libs
        key: jar-cobblemon-bridge-${{ hashFiles('custom-mods/cobblemon-bridge/src/**', 'custom-mods/cobblemon-bridge/build.gradle*', 'custom-mods/cobblemon-bridge/gradle.properties') }}

    - name: Cache cobblemon-carrots build
      id: cache-carrots
      uses: actions/cache@v4
      with:
        path: custom-mods/cobblemon-carrots/build/libs
        key: jar-cobblemon-carrots-${{ hashFiles('custom-mods/cobblemon-carrots/src/**', 'custom-mods/cobblemon-carrots/build.gradle*', 'custom-mods/cobblemon-carrots/gradle.properties') }}

    - name: Cache cobblemon-feedback build
      id: cache-feedback
      uses: actions/cache@v4
      with:
        path: custom-mods/cobblemon-feedback/build/libs
        key: jar-cobblemon-feedback-${{ hashFiles('custom-mods/cobblemon-feedback/src/**', 'custom-mods/cobblemon-feedback/build.gradle*', 'custom-mods/cobblemon-feedback/gradle.properties') }}

    - name: Cache cobblemon-feedback-client build
      id: cache-feedback-client
      uses: actions/cache@v4
      with:
        path: custom-mods/cobblemon-feedback-client/build/libs
        key: jar-cobblemon-feedback-client-${{ hashFiles('custom-mods/cobblemon-feedback-client/src/**', 'custom-mods/cobblemon-feedback-client/build.gradle*', 'custom-mods/cobblemon-feedback-client/gradle.properties') }}

    - name: Cache cobblemon-gacha build
      id: cache-gacha
      uses: actions/cache@v4
      with:
        path: custom-mods/cobblemon-gacha/build/libs
        key: jar-cobblemon-gacha-${{ hashFiles('custom-mods/cobblemon-gacha/src/**', 'custom-mods/cobblemon-gacha/build.gradle*', 'custom-mods/cobblemon-gacha/gradle.properties') }}

    - name: Cache cobblemon-market build
      id: cache-market
      uses: actions/cache@v4
      with:
        path: custom-mods/cobblemon-market/build/libs
        key: jar-cobblemon-market-${{ hashFiles('custom-mods/cobblemon-market/src/**', 'custom-mods/cobblemon-market/build.gradle*', 'custom-mods/cobblemon-market/gradle.properties') }}

    - name: Cache cobblemon-npc build
      id: cache-npc
      uses: actions/cache@v4
      with:
        path: custom-mods/cobblemon-npc/build/libs
        key: jar-cobblemon-npc-${{ hashFiles('custom-mods/cobblemon-npc/src/**', 'custom-mods/cobblemon-npc/build.gradle*', 'custom-mods/cobblemon-npc/gradle.properties') }}

    - name: Cache cobblemon-poke-ai build
      id: cache-poke-ai
      uses: actions/cache@v4
      with:
        path: custom-mods/cobblemon-poke-ai/build/libs
        key: jar-cobblemon-poke-ai-${{ hashFiles('custom-mods/cobblemon-poke-ai/src/**', 'custom-mods/cobblemon-poke-ai/build.gradle*', 'custom-mods/cobblemon-poke-ai/gradle.properties') }}

    - name: Cache cobblemon-ranked build
      id: cache-ranked
      uses: actions/cache@v4
      with:
        path: custom-mods/cobblemon-ranked/build/libs
        key: jar-cobblemon-ranked-${{ hashFiles('custom-mods/cobblemon-ranked/src/**', 'custom-mods/cobblemon-ranked/build.gradle*', 'custom-mods/cobblemon-ranked/gradle.properties') }}

    - name: Cache cobblemon-wilderness build
      id: cache-wilderness
      uses: actions/cache@v4
      with:
        path: custom-mods/cobblemon-wilderness/build/libs
        key: jar-cobblemon-wilderness-${{ hashFiles('custom-mods/cobblemon-wilderness/src/**', 'custom-mods/cobblemon-wilderness/build.gradle*', 'custom-mods/cobblemon-wilderness/gradle.properties') }}

    - name: Build only mods missing from cache
      shell: bash
      env:
        MOD_VERSION: ${{ inputs.mod-version }}
        # Always `assemble` (jars only, no tests). Tests run as a separate
        # step in pr-validation only — keeps caches unified across pr/deploy.
        GRADLE_TASK: assemble
        # Two-column "<mod>:<hit>" lines. Update when adding a new mod.
        CACHE_HITS: |
          cobblemon-bridge:${{ steps.cache-bridge.outputs.cache-hit }}
          cobblemon-carrots:${{ steps.cache-carrots.outputs.cache-hit }}
          cobblemon-feedback:${{ steps.cache-feedback.outputs.cache-hit }}
          cobblemon-feedback-client:${{ steps.cache-feedback-client.outputs.cache-hit }}
          cobblemon-gacha:${{ steps.cache-gacha.outputs.cache-hit }}
          cobblemon-market:${{ steps.cache-market.outputs.cache-hit }}
          cobblemon-npc:${{ steps.cache-npc.outputs.cache-hit }}
          cobblemon-poke-ai:${{ steps.cache-poke-ai.outputs.cache-hit }}
          cobblemon-ranked:${{ steps.cache-ranked.outputs.cache-hit }}
          cobblemon-wilderness:${{ steps.cache-wilderness.outputs.cache-hit }}
      run: |
        set -euo pipefail

        # Parse CACHE_HITS into an associative array.
        declare -A HIT
        while IFS=':' read -r mod hit; do
          mod="${mod#"${mod%%[![:space:]]*}"}"  # ltrim
          [[ -n "$mod" ]] && HIT["$mod"]="$hit"
        done <<< "$CACHE_HITS"

        # Verify every directory under custom-mods/ is enumerated. Anyone
        # adding a new mod must extend the cache stanzas + CACHE_HITS list
        # in this composite. Fail loudly with a clear error if not.
        missing=()
        for dir in custom-mods/*/; do
          mod=$(basename "$dir")
          [[ -z "${HIT[$mod]+x}" ]] && missing+=("$mod")
        done
        if (( ${#missing[@]} > 0 )); then
          echo "::error::Mods missing from build-modpack/action.yml: ${missing[*]}"
          echo "::error::Add a 'Cache cobblemon-<name> build' step AND a CACHE_HITS line for each."
          echo "::error::See the comment block above the cache list in .github/actions/build-modpack/action.yml."
          exit 1
        fi

        # Build only the mods that cache-missed (or whose cached build/libs/
        # is somehow empty — defense in depth).
        rebuilt=0
        for mod in "${!HIT[@]}"; do
          dir="custom-mods/$mod"
          jar=$(ls "$dir/build/libs/"*.jar 2>/dev/null | grep -v -- '-sources\.jar$' | head -1 || true)
          if [[ "${HIT[$mod]}" == "true" && -n "$jar" ]]; then
            echo "::group::cache hit: $mod (skipping build, will ship $(basename "$jar"))"
            ls -la "$dir/build/libs/"
            echo "::endgroup::"
            continue
          fi
          echo "::group::cache miss: building $mod (gradle $GRADLE_TASK)"
          if [[ -n "$MOD_VERSION" ]]; then
            (cd "$dir" && ./gradlew "$GRADLE_TASK" --no-daemon -Pmod_version="$MOD_VERSION")
          else
            (cd "$dir" && ./gradlew "$GRADLE_TASK" --no-daemon)
          fi
          echo "::endgroup::"
          rebuilt=$((rebuilt + 1))
        done
        echo "Rebuilt $rebuilt of ${#HIT[@]} mods (rest were cache hits)."

    - name: Stage built jars into modpack
      shell: bash
      run: |
        set -euo pipefail
        # Per-mod routing. The destination dir controls who gets the jar:
        #
        #   modpack/mods/                  → bundled in mrpack overrides/mods/
        #                                    (both sides; client + server both
        #                                    extract these). Defense-in-depth:
        #                                    @Mod(dist = [...]) on each mod
        #                                    decides which side actually loads
        #                                    it (e.g. cobblemon-feedback-client
        #                                    has dist=[Dist.CLIENT] so the
        #                                    server JVM skips it).
        #   modpack/server-overrides/mods/ → NOT in the client mrpack path
        #                                    Minecraft scans (mrpack puts them
        #                                    at overrides/server-overrides/mods/
        #                                    which clients extract to
        #                                    <mc>/server-overrides/mods/ — not
        #                                    <mc>/mods/). Server install picks
        #                                    them up via a second rsync in the
        #                                    deploy workflows. Net effect:
        #                                    server runs them, client downloads
        #                                    bytes but doesn't load.
        #
        # NB: do NOT put a client-required mod in server-overrides/mods/ — it
        # won't end up in <mc>/mods/ on the client. cobblemon-feedback-client
        # in particular registers required custom payload channels, so if it's
        # not in the client's mods folder, the server's connect-time channel
        # check rejects every client (PR #51 → 0.7.4 had this bug; fixed in
        # 0.7.5 by moving feedback-client back to modpack/mods/).
        SERVER_ONLY=(cobblemon-bridge cobblemon-carrots cobblemon-feedback cobblemon-gacha cobblemon-market cobblemon-poke-ai cobblemon-ranked cobblemon-wilderness)
        # Anything not in SERVER_ONLY ships via modpack/mods/ (both sides).

        mkdir -p modpack/mods modpack/server-overrides/mods

        # Remove prior versions of in-house mods from every staging location.
        # Keep .pw.toml manifests for the third-party mods packwiz resolves.
        for mod in "${SERVER_ONLY[@]}" cobblemon-feedback-client cobblemon-npc; do
          rm -f "modpack/mods/${mod}-"*.jar
          rm -f "modpack/server-overrides/mods/${mod}-"*.jar
        done

        in_array() {
          local needle=$1; shift
          for x in "$@"; do [[ "$x" == "$needle" ]] && return 0; done
          return 1
        }

        for m in custom-mods/*/; do
          mod=$(basename "$m")
          # Ship the runtime jar, NOT the -sources.jar.
          jar=$(ls "${m}build/libs/"*.jar 2>/dev/null | grep -v -- '-sources\.jar$' | head -1)
          if [[ -z "$jar" ]]; then
            echo "::error::No runtime jar found in $m"
            exit 1
          fi
          if in_array "$mod" "${SERVER_ONLY[@]}"; then
            dest=modpack/server-overrides/mods
          else
            dest=modpack/mods
          fi
          cp "$jar" "$dest/"
          echo "Staged: $(basename "$jar") -> $dest/"
        done

    - name: Set pack version (if requested)
      if: inputs.set-pack-version != ''
      shell: bash
      working-directory: modpack
      env:
        PACK_VERSION: ${{ inputs.set-pack-version }}
      run: |
        sed -i "s/^version = \".*\"/version = \"$PACK_VERSION\"/" pack.toml
        packwiz refresh

    - name: Resolve modpack server tree (if requested)
      if: inputs.resolve-server-tree == 'true'
      shell: bash
      working-directory: modpack
      run: |
        # packwiz-installer-bootstrap downloads everything pack.toml references
        # (server side) into the current dir. After this, modpack/mods/ holds
        # the actual jars next to the *.pw.toml manifests.
        curl -sSL -o packwiz-installer-bootstrap.jar \
          https://github.com/packwiz/packwiz-installer-bootstrap/releases/latest/download/packwiz-installer-bootstrap.jar
        java -jar packwiz-installer-bootstrap.jar -g -s server "$(pwd)/pack.toml"
