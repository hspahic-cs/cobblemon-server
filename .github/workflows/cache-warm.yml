name: Cache warm

# Builds every module under custom-mods/ on push to main when build inputs
# change, so the gradle cache lives on the default branch. Tag-triggered
# release runs cannot read caches scoped to other tags but CAN read main's
# cache — this populates the pile that release.yml and deploy-dev.yml read.
#
# Skipped unless build inputs (gradle scripts/wrapper/properties or these
# workflow files) change. Source-only edits to mod code don't affect the
# cached dependency graph.

on:
  push:
    branches: [main]
    paths:
      - 'custom-mods/*/build.gradle'
      - 'custom-mods/*/build.gradle.kts'
      - 'custom-mods/*/settings.gradle'
      - 'custom-mods/*/settings.gradle.kts'
      - 'custom-mods/*/gradle.properties'
      - 'custom-mods/*/gradle/**'
      - 'custom-mods/*/gradlew'
      - '.github/workflows/cache-warm.yml'
      - '.github/workflows/release.yml'
      - '.github/workflows/deploy-dev.yml'
      - '.github/workflows/deploy-prod.yml'
  workflow_dispatch:

jobs:
  warm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('custom-mods/*/build.gradle*', 'custom-mods/*/settings.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build all custom mods
        run: |
          set -euo pipefail
          for m in custom-mods/*/; do
            echo "::group::Build $m"
            (cd "$m" && ./gradlew build --no-daemon)
            echo "::endgroup::"
          done

      - name: Cache packwiz binary
        id: cache-packwiz
        uses: actions/cache@v4
        with:
          path: ~/go/bin/packwiz
          key: packwiz-${{ runner.os }}-dfd8b68a4796c763e25bad50265ea1f1233e24f1

      - name: Install packwiz
        if: steps.cache-packwiz.outputs.cache-hit != 'true'
        run: go install github.com/packwiz/packwiz@dfd8b68a4796c763e25bad50265ea1f1233e24f1
