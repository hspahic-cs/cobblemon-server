name: Deploy dev

# Deploys to cobblemon-dev whenever a commit lands on main with a CHANGELOG bump
# (a new `## [vX.Y.Z]` heading at the top, above [Unreleased]). The CHANGELOG
# entry is the explicit deploy signal — code-only commits don't deploy.
#
# Idempotent: stores the deployed version on the VM at .deployed_version; reruns
# for the same version are no-ops.
#
# Runs on ubuntu-latest. Reaches the LAN-only Minecraft VM via Tailscale —
# the workflow joins our tailnet with an ephemeral OAuth-minted auth key,
# then SSH/rsync's to the VM's tailnet hostname.

on:
  push:
    branches: [main]
    paths:
      - 'CHANGELOG.md'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g. 0.4.0). Defaults to latest CHANGELOG entry.'
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-dev
      cancel-in-progress: false
    env:
      VM_HOST: cobblemon-dev          # tailnet hostname
      VM_USER: deployer
      ENV_NAME: dev
      SERVICE: cobblemon-dev
      INSTALL_DIR: /opt/cobblemon-dev
      KEEP_VERSIONS: 5
    steps:
      - uses: actions/checkout@v4

      - name: Resolve target version
        id: ver
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
            echo "Using workflow_dispatch input: $VERSION"
          else
            # Topmost `## [X.Y.Z] - YYYY-MM-DD` heading in CHANGELOG.md.
            VERSION=$(awk '
              /^## \[Unreleased\]/ { next }
              /^## \[[0-9]+\.[0-9]+\.[0-9]+\]/ {
                gsub(/^## \[|\].*/, ""); print; exit
              }' CHANGELOG.md)
            if [[ -z "$VERSION" ]]; then
              echo "::error::Could not parse a version from CHANGELOG.md"
              exit 1
            fi
            echo "Parsed version from CHANGELOG.md: $VERSION"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Tailscale + SSH setup
        uses: ./.github/actions/tailscale-ssh
        with:
          ts-oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          ts-oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          ssh-private-key: ${{ secrets.DEPLOYER_SSH_KEY }}
          vm-host: ${{ env.VM_HOST }}

      - name: Skip if version already deployed
        id: idempotency
        run: |
          REMOTE_VERSION=$(ssh -o StrictHostKeyChecking=yes ${{ env.VM_USER }}@${{ env.VM_HOST }} \
            "cat ${{ env.INSTALL_DIR }}/.deployed_version 2>/dev/null || true")
          if [[ "$REMOTE_VERSION" == "${{ steps.ver.outputs.version }}" ]]; then
            echo "Version ${{ steps.ver.outputs.version }} already deployed; skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Deployed version on VM: '${REMOTE_VERSION:-(none)}'; will deploy ${{ steps.ver.outputs.version }}"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build all custom mods
        if: steps.idempotency.outputs.skip != 'true'
        uses: ./.github/actions/build-modpack
        with:
          mod-version: ${{ steps.ver.outputs.version }}
          set-pack-version: ${{ steps.ver.outputs.version }}
          resolve-server-tree: 'true'

      - name: Rsync mods to VM staging
        if: steps.idempotency.outputs.skip != 'true'
        run: |
          VERSION_DIR="mods.v${{ steps.ver.outputs.version }}"
          # 1) Both-sides + third-party (resolved by packwiz-installer-bootstrap).
          rsync -az --delete \
            --exclude='*.pw.toml' \
            -e "ssh -o StrictHostKeyChecking=yes" \
            modpack/mods/ \
            ${{ env.VM_USER }}@${{ env.VM_HOST }}:${{ env.INSTALL_DIR }}/staging/${VERSION_DIR}/
          # 2) Server-only custom mods (staged outside modpack/mods/ so they're
          #    not in the client .mrpack). Overlay, no --delete.
          if compgen -G 'modpack/server-overrides/mods/*.jar' >/dev/null; then
            rsync -az \
              -e "ssh -o StrictHostKeyChecking=yes" \
              modpack/server-overrides/mods/ \
              ${{ env.VM_USER }}@${{ env.VM_HOST }}:${{ env.INSTALL_DIR }}/staging/${VERSION_DIR}/
          fi

      - name: Rsync datapacks (overlay onto live world, non-destructive)
        if: steps.idempotency.outputs.skip != 'true'
        run: |
          # No --delete: don't remove datapacks the live world has that we don't ship.
          rsync -rltzO \
            -e "ssh -o StrictHostKeyChecking=yes" \
            modpack/server-overrides/datapacks/ \
            ${{ env.VM_USER }}@${{ env.VM_HOST }}:${{ env.INSTALL_DIR }}/world/datapacks/

      # Scoped --delete for the trainer-admin function folders ONLY (gym/e4/bt) — we own 100% of
      # these, so pruning stale files here can't touch other datapacks. Clears renamed-away
      # commands (e.g. the old numbered spawn_N) that the non-destructive rsync above leaves behind.
      - name: Prune stale trainer-admin functions (gym/e4/bt)
        if: steps.idempotency.outputs.skip != 'true'
        run: |
          base=modpack/server-overrides/datapacks/server-quests/data/server/function
          dest=${{ env.INSTALL_DIR }}/world/datapacks/server-quests/data/server/function
          for d in gym e4 bt; do
            rsync -rltzO --delete \
              -e "ssh -o StrictHostKeyChecking=yes" \
              "$base/$d/" \
              "${{ env.VM_USER }}@${{ env.VM_HOST }}:$dest/$d/"
          done

      # AllTheMons ships as a single version-named .zip datapack. The non-destructive datapack
      # rsync above never deletes, so a version bump (R3.4 -> R3.5) leaves the old zip behind →
      # two AllTheMons → duplicate Cobblemon species/animations → client crash. Prune any
      # AllTheMons*.zip on the server that isn't the version we currently ship.
      - name: Prune stale AllTheMons datapack zips
        if: steps.idempotency.outputs.skip != 'true'
        run: |
          current=$(cd modpack/server-overrides/datapacks && ls AllTheMons*.zip 2>/dev/null | head -1)
          if [ -n "$current" ]; then
            ssh -o StrictHostKeyChecking=yes ${{ env.VM_USER }}@${{ env.VM_HOST }} \
              "bash -s -- '${{ env.INSTALL_DIR }}/world/datapacks' '$current'" \
              < ops/prune-stale-allthemons.sh
          fi

      # The non-destructive datapack rsync never removes a pack we DELETE from the repo, so retired
      # server-* packs linger on the live world forever (e.g. server-spawn-nerfs and its orphaned
      # server_spawn_filler namespace). Prune any server-* datapack on the server that we no longer
      # ship. Scoped to the server-* prefix, so AllTheMons / world-only packs are never touched.
      - name: Prune retired server-* datapacks
        if: steps.idempotency.outputs.skip != 'true'
        run: |
          keep=$(cd modpack/server-overrides/datapacks && ls -d server-* 2>/dev/null | tr '\n' ' ')
          ssh -o StrictHostKeyChecking=yes ${{ env.VM_USER }}@${{ env.VM_HOST }} \
            "bash -s -- '${{ env.INSTALL_DIR }}/world/datapacks' '$keep'" \
            < ops/prune-removed-server-datapacks.sh

      - name: Rsync authored configs (overlay onto live config/, non-destructive)
        if: steps.idempotency.outputs.skip != 'true'
        run: |
          # See docs/design/mod-state-vs-config.md.
          if [[ -d modpack/server-overrides/config ]]; then
            rsync -rltzO \
              -e "ssh -o StrictHostKeyChecking=yes" \
              modpack/server-overrides/config/ \
              ${{ env.VM_USER }}@${{ env.VM_HOST }}:${{ env.INSTALL_DIR }}/config/
          else
            echo "modpack/server-overrides/config/ doesn't exist yet; skipping authored-config rsync"
          fi

      # Inert until the RESOURCEPACK_URL repo variable is set. Sets resource-pack / -sha1 /
      # require-resource-pack=false in the VM's server.properties (the next restart picks it up).
      - name: Apply server resource-pack to server.properties
        if: steps.idempotency.outputs.skip != 'true' && vars.RESOURCEPACK_URL != ''
        run: |
          ssh -o StrictHostKeyChecking=yes ${{ env.VM_USER }}@${{ env.VM_HOST }} \
            "bash -s -- '${{ vars.RESOURCEPACK_URL }}' '${{ vars.RESOURCEPACK_SHA1 || '24cad3bdd37e658213d6186581e1533b4f1fe96a' }}' '${{ env.INSTALL_DIR }}/server.properties'" \
            < ops/set-server-resourcepack.sh

      - name: Atomic swap and restart
        if: steps.idempotency.outputs.skip != 'true'
        # mods/ MUST be a real directory, not a symlink to mods.vX/. Sinytra
        # Connector's IModFileCandidateLocator services don't get picked up
        # via NeoForge's ServiceLoader when mods/ is a symlink — Connector
        # silently no-ops, every Fabric mod (LegendaryMonuments, etc) is
        # skipped at discovery, and only the NeoForge-native subset loads.
        # The fix: keep mods.vX/ archives at install root for rollback, but
        # mods/ itself is a hardlink copy (cp -al = no extra disk, real dir).
        run: |
          VERSION_DIR="mods.v${{ steps.ver.outputs.version }}"
          ssh -o StrictHostKeyChecking=yes ${{ env.VM_USER }}@${{ env.VM_HOST }} "set -euo pipefail
            cd ${{ env.INSTALL_DIR }}
            if [ -d staging/${VERSION_DIR} ]; then
              rm -rf ${VERSION_DIR}
              mv staging/${VERSION_DIR} ./
            fi
            # Best-effort sweep of any leaked swap-* dirs from prior runs.
            # .connector/ inside old swap dirs is written by sysadmin at boot,
            # so deployer can't rm it directly — use the sudo wrapper instead.
            rm -rf mods.swap-new || true
            sudo -n /usr/local/sbin/cobblemon-cleanup-swap || true
            cp -al ${VERSION_DIR} mods.swap-new
            # Connector caches transformed Fabric jars under mods/.connector/
            # at first boot. The service runs as sysadmin (not deployer), so
            # mods/ needs to be group-writable by sysadmin. Set group + perms
            # before the swap so the JVM can create .connector/.
            chgrp sysadmin mods.swap-new
            chmod 0775 mods.swap-new
            SWAP_OLD=mods.swap-old.\$\$
            if [ -L mods ]; then
              rm mods
            elif [ -e mods ]; then
              mv mods \$SWAP_OLD
            fi
            mv mods.swap-new mods
            sudo -n /usr/local/sbin/cobblemon-cleanup-swap || true
            sudo -n /usr/bin/systemctl restart ${{ env.SERVICE }}
            ls -1dt mods.v*/ 2>/dev/null | tail -n +$((${{ env.KEEP_VERSIONS }} + 1)) | xargs -r rm -rf
            echo '${{ steps.ver.outputs.version }}' > .deployed_version
          "

      - name: Wait for service to come up
        if: steps.idempotency.outputs.skip != 'true'
        run: |
          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=yes ${{ env.VM_USER }}@${{ env.VM_HOST }} \
              "sudo -n /usr/bin/systemctl is-active ${{ env.SERVICE }}" | grep -q '^active$'; then
              echo "${{ env.SERVICE }} is active"
              break
            fi
            sleep 2
            if [[ $i -eq 30 ]]; then
              echo "${{ env.SERVICE }} did not become active within 60s" >&2
              exit 1
            fi
          done

      - name: Publish dev-latest pre-release
        if: steps.idempotency.outputs.skip != 'true'
        uses: ./.github/actions/publish-mrpack
        with:
          tag-name: dev-latest
          release-name: "Dev latest (${{ steps.ver.outputs.version }})"
          prerelease: 'true'
          rolling: 'true'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            Rolling pre-release tracking the head of `cobblemon-dev`.

            **Version:** ${{ steps.ver.outputs.version }}
            **Dev server:** ask Harris for the address.

            Grab the `.mrpack` below and import into PrismLauncher: **Add Instance → Import → file**.

      - name: Add download link to run summary
        if: steps.idempotency.outputs.skip != 'true'
        run: |
          {
            echo "## Modpack download"
            echo
            echo "**Version:** ${{ steps.ver.outputs.version }}"
            echo
            echo "[Download .mrpack from the dev-latest release](https://github.com/${{ github.repository }}/releases/tag/dev-latest)"
            echo
            echo "In PrismLauncher: **Add Instance → Import → file →** select the downloaded \`.mrpack\`."
          } >> "$GITHUB_STEP_SUMMARY"
