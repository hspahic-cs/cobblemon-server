name: Deploy dev

# Deploys to cobblemon-dev whenever a commit lands on main with a CHANGELOG bump
# (a new `## [vX.Y.Z]` heading at the top, above [Unreleased]). The CHANGELOG
# entry is the explicit deploy signal — code-only commits don't deploy.
#
# Idempotent: stores the deployed version on the VM at .deployed_version; reruns
# for the same version are no-ops.
#
# workflow_dispatch input lets you force-deploy any version on demand (e.g. after
# fixing a deploy-time issue without bumping CHANGELOG again).

on:
  push:
    branches: [main]
    paths:
      - 'CHANGELOG.md'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g. 0.4.0). Defaults to latest CHANGELOG entry.'
        required: false

permissions:
  # Needed to overwrite the rolling `dev-latest` pre-release with each new mrpack.
  contents: write

jobs:
  deploy:
    # Self-hosted runner in the K8s cluster (see gemini-server repo for the
    # ARC scale-set). Same LAN as the MC VM, so rsync is fast.
    runs-on: cobblemon-server
    concurrency:
      # One dev deploy at a time. A queued deploy waits behind the current one.
      group: deploy-dev
      cancel-in-progress: false
    env:
      VM_HOST: 192.168.1.20
      VM_USER: deployer
      ENV_NAME: dev
      SERVICE: cobblemon-dev
      INSTALL_DIR: /opt/cobblemon-dev
      KEEP_VERSIONS: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve target version
        id: ver
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
            echo "Using workflow_dispatch input: $VERSION"
          else
            # Topmost `## [X.Y.Z] - YYYY-MM-DD` heading in CHANGELOG.md.
            # Skips `## [Unreleased]`. First match wins.
            VERSION=$(awk '
              /^## \[Unreleased\]/ { next }
              /^## \[[0-9]+\.[0-9]+\.[0-9]+\]/ {
                gsub(/^## \[|\].*/, ""); print; exit
              }' CHANGELOG.md)
            if [[ -z "$VERSION" ]]; then
              echo "::error::Could not parse a version from CHANGELOG.md"
              exit 1
            fi
            echo "Parsed version from CHANGELOG.md: $VERSION"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install build/deploy deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq rsync openssh-client

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          install -m 0600 /etc/deploy-keys/id_ed25519 ~/.ssh/id_ed25519
          install -m 0644 /etc/deploy-keys/known_hosts ~/.ssh/known_hosts

      - name: Skip if version already deployed
        id: idempotency
        run: |
          REMOTE_VERSION=$(ssh -o StrictHostKeyChecking=yes ${{ env.VM_USER }}@${{ env.VM_HOST }} \
            "cat ${{ env.INSTALL_DIR }}/.deployed_version 2>/dev/null || true")
          if [[ "$REMOTE_VERSION" == "${{ steps.ver.outputs.version }}" ]]; then
            echo "Version ${{ steps.ver.outputs.version }} already deployed; skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Deployed version on VM: '${REMOTE_VERSION:-(none)}'; will deploy ${{ steps.ver.outputs.version }}"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 21
        if: steps.idempotency.outputs.skip != 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Go (for packwiz)
        if: steps.idempotency.outputs.skip != 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install packwiz
        if: steps.idempotency.outputs.skip != 'true'
        run: |
          go install github.com/packwiz/packwiz@dfd8b68a4796c763e25bad50265ea1f1233e24f1
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Build all custom mods
        if: steps.idempotency.outputs.skip != 'true'
        run: |
          set -euo pipefail
          for m in custom-mods/*/; do
            echo "::group::Build $m"
            (cd "$m" && ./gradlew build --no-daemon -Pmod_version=${{ steps.ver.outputs.version }})
            echo "::endgroup::"
          done

      - name: Stage built jars into modpack
        if: steps.idempotency.outputs.skip != 'true'
        run: |
          set -euo pipefail
          mkdir -p modpack/mods
          # Remove prior versions of our custom mods only — keep .pw.toml manifests
          # for the third-party mods packwiz will resolve.
          rm -f modpack/mods/cobblemon-{npc,bridge,carrots,gacha,market,ranked}-*.jar
          for m in custom-mods/*/; do
            # Ship the runtime jar, NOT the -sources.jar.
            jar=$(ls "${m}build/libs/"*.jar 2>/dev/null | grep -v -- '-sources\.jar$' | head -1)
            if [[ -z "$jar" ]]; then
              echo "::error::No runtime jar found in $m"
              exit 1
            fi
            cp "$jar" modpack/mods/
            echo "Staged: $(basename "$jar")"
          done

      - name: Resolve modpack server tree
        # packwiz-installer-bootstrap downloads everything pack.toml references
        # (server side) into the current dir. After this, modpack/mods/ holds
        # the actual jars next to the *.pw.toml manifests.
        if: steps.idempotency.outputs.skip != 'true'
        working-directory: modpack
        run: |
          sed -i 's/^version = ".*"/version = "${{ steps.ver.outputs.version }}"/' pack.toml
          packwiz refresh
          curl -sSL -o packwiz-installer-bootstrap.jar \
            https://github.com/packwiz/packwiz-installer-bootstrap/releases/latest/download/packwiz-installer-bootstrap.jar
          java -jar packwiz-installer-bootstrap.jar -g -s server "$(pwd)/pack.toml"

      - name: Rsync mods to VM staging
        if: steps.idempotency.outputs.skip != 'true'
        run: |
          VERSION_DIR="mods.v${{ steps.ver.outputs.version }}"
          rsync -az --delete \
            --exclude='*.pw.toml' \
            -e "ssh -o StrictHostKeyChecking=yes" \
            modpack/mods/ \
            ${{ env.VM_USER }}@${{ env.VM_HOST }}:${{ env.INSTALL_DIR }}/staging/${VERSION_DIR}/

      - name: Rsync datapacks (overlay onto live world, non-destructive)
        if: steps.idempotency.outputs.skip != 'true'
        run: |
          # No --delete: don't remove datapacks the live world has that we don't ship.
          # No --owner / --group / --omit-dir-times: deployer doesn't own
          # world/datapacks/ (sysadmin does), only has group write via the
          # sysadmin group. utime() on the dir itself fails for non-owners.
          rsync -rltzO \
            -e "ssh -o StrictHostKeyChecking=yes" \
            modpack/server-overrides/datapacks/ \
            ${{ env.VM_USER }}@${{ env.VM_HOST }}:${{ env.INSTALL_DIR }}/world/datapacks/

      - name: Atomic swap and restart
        if: steps.idempotency.outputs.skip != 'true'
        run: |
          VERSION_DIR="mods.v${{ steps.ver.outputs.version }}"
          ssh -o StrictHostKeyChecking=yes ${{ env.VM_USER }}@${{ env.VM_HOST }} "set -euo pipefail
            cd ${{ env.INSTALL_DIR }}
            if [ -d staging/${VERSION_DIR} ]; then
              rm -rf ${VERSION_DIR}
              mv staging/${VERSION_DIR} ./
            fi
            ln -sfn ${VERSION_DIR} mods
            sudo -n /usr/bin/systemctl restart ${{ env.SERVICE }}
            # Prune old mods.v* dirs, keeping the most recent N.
            ls -1dt mods.v*/ 2>/dev/null | tail -n +$((${{ env.KEEP_VERSIONS }} + 1)) | xargs -r rm -rf
            # Record the deployed version for idempotency.
            echo '${{ steps.ver.outputs.version }}' > .deployed_version
          "

      - name: Wait for service to come up
        if: steps.idempotency.outputs.skip != 'true'
        run: |
          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=yes ${{ env.VM_USER }}@${{ env.VM_HOST }} \
              "sudo -n /usr/bin/systemctl is-active ${{ env.SERVICE }}" | grep -q '^active$'; then
              echo "${{ env.SERVICE }} is active"
              break
            fi
            sleep 2
            if [[ $i -eq 30 ]]; then
              echo "${{ env.SERVICE }} did not become active within 60s" >&2
              exit 1
            fi
          done

      # ─── publish mrpack to rolling `dev-latest` pre-release ─────────────────────
      # So players testing on dev can grab a fresh modpack from the same URL every
      # time without needing to tag an official release.

      - name: Export .mrpack
        if: steps.idempotency.outputs.skip != 'true'
        working-directory: modpack
        run: |
          packwiz mr export
          ls *.mrpack

      - name: Overwrite dev-latest pre-release
        if: steps.idempotency.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MRPACK=$(ls modpack/*.mrpack | head -1)
          NOTES="Rolling pre-release of the dev modpack — overwritten on every deploy to cobblemon-dev.

          - **Version**: ${{ steps.ver.outputs.version }}
          - **Built**: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          - **Server**: \`108.21.168.120:25566\`

          For PrismLauncher: Add Instance → Import → use the asset URL below.

          ⚠️ Pre-release: this is the latest dev build, not necessarily stable.
          For prod, use a tagged \`vX.Y.Z\` release."

          # Delete any existing dev-latest release (and its assets) so we can
          # cleanly reupload. `gh release delete` removes the release but keeps
          # the tag; we delete the tag too for a fully clean recreation.
          gh release delete dev-latest --yes --cleanup-tag 2>/dev/null || true

          gh release create dev-latest \
            --prerelease \
            --target main \
            --title "dev-latest (built from ${{ steps.ver.outputs.version }})" \
            --notes "$NOTES" \
            "$MRPACK"
