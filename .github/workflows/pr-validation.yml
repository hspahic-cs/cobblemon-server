name: PR validation

# Builds every custom mod and validates the modpack manifest on every PR
# touching the modpack or custom-mods. No deploy. Acts as the merge gate
# AND populates the gradle/packwiz cache that downstream workflows
# (deploy-dev, deploy-prod, release) restore from.

on:
  pull_request:
    paths:
      - 'custom-mods/**'
      - 'modpack/**'
      - '.github/workflows/pr-validation.yml'
      - '.github/actions/**'

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build all custom mods (with tests)
        uses: ./.github/actions/build-modpack
        with:
          # PR validation runs the full `build` task which includes unit tests.
          # Deploy workflows use the default (`assemble`) since the PR that
          # bumped CHANGELOG already validated tests.
          gradle-task: build

      - name: Validate modpack manifest
        working-directory: modpack
        run: |
          packwiz refresh
          # If refresh produced any unexpected diff, surface it.
          if ! git diff --exit-code -- index.toml; then
            echo "::warning::packwiz refresh changed index.toml — committed index is stale."
          fi
