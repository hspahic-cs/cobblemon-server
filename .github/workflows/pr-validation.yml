name: PR validation

# Builds every custom mod and validates the modpack manifest on every PR
# touching the modpack or custom-mods. No deploy. Acts as the merge gate.

on:
  pull_request:
    paths:
      - 'custom-mods/**'
      - 'modpack/**'
      - '.github/workflows/pr-validation.yml'

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('custom-mods/*/build.gradle*', 'custom-mods/*/settings.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build all custom mods
        run: |
          set -euo pipefail
          for m in custom-mods/*/; do
            echo "::group::Build $m"
            (cd "$m" && ./gradlew build --no-daemon)
            echo "::endgroup::"
          done

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Cache packwiz binary
        id: cache-packwiz
        uses: actions/cache@v4
        with:
          path: ~/go/bin/packwiz
          key: packwiz-${{ runner.os }}-dfd8b68a4796c763e25bad50265ea1f1233e24f1

      - name: Install packwiz
        if: steps.cache-packwiz.outputs.cache-hit != 'true'
        run: go install github.com/packwiz/packwiz@dfd8b68a4796c763e25bad50265ea1f1233e24f1

      - name: Validate modpack manifest
        working-directory: modpack
        run: |
          ~/go/bin/packwiz refresh
          # If refresh produced any unexpected diff, surface it.
          if ! git diff --exit-code -- index.toml; then
            echo "::warning::packwiz refresh changed index.toml — committed index is stale."
          fi
