name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write  # required to create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          # Exclude gradle.properties from the hash: it contains mod_version,
          # which bumps every release and would otherwise invalidate the cache.
          # Dependency versions live in *.gradle files.
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle', '**/*.gradle.kts') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build cobblemon-npc
        working-directory: custom-mods/cobblemon-npc
        run: ./gradlew build --no-daemon -Pmod_version=${{ steps.version.outputs.version }}

      - name: Cache packwiz binary
        id: cache-packwiz
        uses: actions/cache@v4
        with:
          path: ~/go/bin/packwiz
          key: packwiz-${{ runner.os }}-dfd8b68a4796c763e25bad50265ea1f1233e24f1

      - name: Install packwiz
        if: steps.cache-packwiz.outputs.cache-hit != 'true'
        run: go install github.com/packwiz/packwiz@dfd8b68a4796c763e25bad50265ea1f1233e24f1

      - name: Add packwiz to PATH
        run: echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Stage cobblemon-npc jar into modpack
        run: |
          mkdir -p modpack/mods
          rm -f modpack/mods/cobblemon-npc-*.jar
          cp custom-mods/cobblemon-npc/build/libs/cobblemon-npc-${{ steps.version.outputs.version }}.jar modpack/mods/

      - name: Set pack version and export .mrpack
        working-directory: modpack
        run: |
          sed -i 's/^version = ".*"/version = "${{ steps.version.outputs.version }}"/' pack.toml
          packwiz refresh
          packwiz mr export

      - name: Find the .mrpack output
        id: mrpack
        run: |
          MRPACK=$(ls modpack/*.mrpack | head -1)
          echo "path=$MRPACK" >> "$GITHUB_OUTPUT"
          echo "Found: $MRPACK"

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: false
          body: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md) for changes.
          files: |
            custom-mods/cobblemon-npc/build/libs/cobblemon-npc-${{ steps.version.outputs.version }}.jar
            ${{ steps.mrpack.outputs.path }}
