name: Release

# Tag-triggered: builds all custom mods at the tagged version, exports a .mrpack,
# and drafts a GitHub Release with the jars + mrpack attached. Does NOT deploy
# anywhere — deploys are driven by deploy-dev (CHANGELOG-bump on main) and
# deploy-prod (manual workflow_dispatch on a tag).

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write  # required to create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Build all custom mods
        uses: ./.github/actions/build-modpack
        with:
          mod-version: ${{ steps.version.outputs.version }}
          set-pack-version: ${{ steps.version.outputs.version }}

      - name: Publish draft release
        uses: ./.github/actions/publish-mrpack
        with:
          tag-name: ${{ github.ref_name }}
          release-name: ${{ github.ref_name }}
          prerelease: 'false'
          draft: 'true'
          rolling: 'false'
          extra-files: custom-mods/*/build/libs/cobblemon-*-${{ steps.version.outputs.version }}.jar
          github-token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md) for changes.
