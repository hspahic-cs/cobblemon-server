name: Release

# Tag-triggered: builds all custom mods at the tagged version, exports a .mrpack,
# and drafts a GitHub Release with the jars + mrpack attached. Does NOT deploy
# anywhere — deploys are driven by deploy-dev (CHANGELOG-bump on main) and
# deploy-prod (manual workflow_dispatch on a tag).

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write  # required to create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          # Excludes gradle.properties (mod_version bumps every release; we
          # pass -Pmod_version anyway). Dependency versions live in *.gradle*.
          key: gradle-${{ runner.os }}-${{ hashFiles('custom-mods/*/build.gradle*', 'custom-mods/*/settings.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build all custom mods
        run: |
          set -euo pipefail
          for m in custom-mods/*/; do
            echo "::group::Build $m"
            (cd "$m" && ./gradlew build --no-daemon -Pmod_version=${{ steps.version.outputs.version }})
            echo "::endgroup::"
          done

      - name: Cache packwiz binary
        id: cache-packwiz
        uses: actions/cache@v4
        with:
          path: ~/go/bin/packwiz
          key: packwiz-${{ runner.os }}-dfd8b68a4796c763e25bad50265ea1f1233e24f1

      - name: Install packwiz
        if: steps.cache-packwiz.outputs.cache-hit != 'true'
        run: go install github.com/packwiz/packwiz@dfd8b68a4796c763e25bad50265ea1f1233e24f1

      - name: Add packwiz to PATH
        run: echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Stage built jars into modpack
        run: |
          set -euo pipefail
          mkdir -p modpack/mods
          rm -f modpack/mods/cobblemon-{npc,bridge,carrots,gacha,market,ranked}-*.jar
          for m in custom-mods/*/; do
            jar=$(ls "${m}build/libs/"*.jar 2>/dev/null | grep -v -- '-sources\.jar$' | head -1)
            if [[ -z "$jar" ]]; then
              echo "::error::No runtime jar found in $m"
              exit 1
            fi
            cp "$jar" modpack/mods/
            echo "Staged: $(basename "$jar")"
          done

      - name: Set pack version and export .mrpack
        working-directory: modpack
        run: |
          sed -i 's/^version = ".*"/version = "${{ steps.version.outputs.version }}"/' pack.toml
          packwiz refresh
          packwiz mr export

      - name: Find the .mrpack output
        id: mrpack
        run: |
          MRPACK=$(ls modpack/*.mrpack | head -1)
          echo "path=$MRPACK" >> "$GITHUB_OUTPUT"
          echo "Found: $MRPACK"

      - name: Collect built jars for release
        id: jars
        run: |
          # Build a multi-line file list for the release artifacts.
          {
            for m in custom-mods/*/; do
              jar=$(ls "${m}build/libs/"*.jar 2>/dev/null | grep -v -- '-sources\.jar$' | head -1)
              [[ -n "$jar" ]] && echo "$jar"
            done
          } > /tmp/release-files.txt
          cat /tmp/release-files.txt

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: false
          body: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md) for changes.
          files: |
            custom-mods/*/build/libs/cobblemon-*-${{ steps.version.outputs.version }}.jar
            ${{ steps.mrpack.outputs.path }}
