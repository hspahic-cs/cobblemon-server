modLoader = "kotlinforforge"
loaderVersion = "[5,)"
license = "All Rights Reserved"

[[mods]]
modId = "cobblemon_feedback"
version = "${version}"
displayName = "Cobblemon Feedback"
description = "In-game /feedback command for players to file bug reports and suggestions to GitHub Issues. Captures rich server-side metadata (coords, dimension, party, TPS, recent log)."
authors = "harris"
# Server-side only — listens to commands and posts to GitHub. IGNORE_ALL_VERSION
# skips the version handshake so vanilla / non-feedback clients can connect.
displayTest = "IGNORE_ALL_VERSION"

[[dependencies.cobblemon_feedback]]
modId = "neoforge"
type = "required"
versionRange = "[21.1,)"
ordering = "NONE"
side = "BOTH"

[[dependencies.cobblemon_feedback]]
modId = "kotlinforforge"
type = "required"
versionRange = "[5,)"
ordering = "NONE"
side = "BOTH"

[[dependencies.cobblemon_feedback]]
modId = "cobblemon"
type = "required"
versionRange = "[1.7.1,)"
ordering = "AFTER"
side = "BOTH"
