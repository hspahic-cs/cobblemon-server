# javafml modLoader, mirroring the working cobblemon-npc mixin mod: a plain Kotlin @Mod class
# with an (IEventBus, ModContainer) constructor that javafml instantiates; kotlinforforge stays
# a dependency below for the Kotlin stdlib. Our [[mixins]] config registers and applies under
# this setup (verified on the dev server).
modLoader = "javafml"
loaderVersion = "[4,)"
license = "All Rights Reserved"

[[mods]]
modId = "cobblemon_wilderness"
version = "${version}"
displayName = "Cobblemon Wilderness Reset"
description = "Resets wilderness chunks outside a persistent bounding box to cap world growth"
authors = "almutwakel"
# Server-side only: clients don't need this jar. IGNORE_ALL_VERSION skips the
# version handshake so vanilla / mismatched clients can connect without rejection.
displayTest = "IGNORE_ALL_VERSION"

# Structure-relocation hook (inert unless reseedStructuresOutsideBox=true in config).
[[mixins]]
config = "cobblemon_wilderness.mixins.json"

[[dependencies.cobblemon_wilderness]]
modId = "neoforge"
type = "required"
versionRange = "[21.1,)"
ordering = "NONE"
side = "BOTH"

[[dependencies.cobblemon_wilderness]]
modId = "kotlinforforge"
type = "required"
versionRange = "[5,)"
ordering = "NONE"
side = "BOTH"
